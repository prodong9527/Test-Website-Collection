        let history = [];
        
        // 开始测试
        function startTest() {
            history = [];
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion('q1');
        }
        
        // 显示题目
        function showQuestion(questionId) {
            const question = testData.questions[questionId];
            if (!question) return;
            
            const questionContent = document.getElementById('question-content');
            let html = `<div class="question fade-in">
                <h2>${question.text}</h2>
                <div class="options">`;
            
            question.options.forEach(option => {
                html += `<div class="option" onclick="selectOption('${option.next}')">${option.text}</div>`;
            });
            
            // 添加返回上一题按钮（如果不是第一题）
            if (history.length > 0) {
                html += `</div>
                <button class="prev-btn" onclick="goBack()">返回上一题</button>`;
            } else {
                html += `</div>`;
            }
            
            html += `</div>`;
            questionContent.innerHTML = html;
        }
        
        // 选择选项
        function selectOption(next) {
            // 检查是否是结局
            if (testData.endings[next]) {
                showResult(next);
            } else {
                // 记录当前题目到历史
                history.push(next);
                // 显示下一题
                showQuestion(next);
            }
        }
        
        // 返回上一题
        function goBack() {
            if (history.length > 1) {
                // 移除最后一个记录
                history.pop();
                // 显示上一题
                showQuestion(history[history.length - 1]);
            } else if (history.length === 1) {
                // 如果只有一个记录，返回第一题
                history.pop();
                showQuestion('q1');
            }
        }
        
        // 显示结果
        function showResult(endingId) {
            const ending = testData.endings[endingId];
            if (!ending) return;
            
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const resultContent = document.getElementById('result-content');
            resultContent.innerHTML = `
                <h2>${ending.title}</h2>
                <div class="result-content">${ending.content}</div>
            `;
        }
