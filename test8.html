            {a:{金毛:3,柯基:3},b:{边牧:3,德牧:3},c:{哈士奇:3,巴哥:3},d:{中华田园犬:3,藏獒:3},n:{萨摩耶:-2,博美:-2}},
            {a:{柯基:3,金毛:3},b:{杜宾:3,藏獒:3,边牧:2},c:{比格:3,哈士奇:3},d:{西高地:3,柴犬:3},n:{泰迪:-2,萨摩耶:-2}},
            {a:{萨摩耶:3,拉布拉多:3},b:{杜宾:3,边牧:3},c:{比格:3,哈士奇:3},d:{西高地:3,藏獒:3},n:{杜宾:-2,藏獒:-2}},
            {a:{柯基:3,金毛:3},b:{边牧:3,德牧:3,杜宾:2},c:{比格:3,哈士奇:3},d:{西高地:3,博美:3},n:{柴犬:-2,藏獒:-2}}
        ];

        let currentQuestion = 0;
        let answers = new Array(45).fill(-1);
        let dogScores = {};
        let introFrame = 0;
        let testFrame = 0;
        let introInterval = null;
        let testInterval = null;

        window.onload = function() {
            introFrame = 0;
            for (let i = 1; i <= 4; i++) {
                document.getElementById('frame' + i).classList.remove('active');
            }
            document.getElementById('frame1').classList.add('active');
            introInterval = setInterval(() => {
                document.getElementById('frame' + (1 + introFrame)).classList.remove('active');
                introFrame = (introFrame + 1) % 4;
                document.getElementById('frame' + (1 + introFrame)).classList.add('active');
            }, 200);
        };

        function startTest() {
            document.getElementById('introPage').classList.remove('active');
            document.getElementById('testPage').classList.add('active');
            if (introInterval) clearInterval(introInterval);
            testFrame = 0;
            for (let i = 1; i <= 4; i++) {
                document.getElementById('test-frame' + i).classList.remove('active');
            }
            document.getElementById('test-frame1').classList.add('active');
            testInterval = setInterval(() => {
                document.getElementById('test-frame' + (1 + testFrame)).classList.remove('active');
                testFrame = (testFrame + 1) % 4;
                document.getElementById('test-frame' + (1 + testFrame)).classList.add('active');
            }, 200);
            renderQuestion();
        }

        function getModule(questionIndex) {
            if (questionIndex < 9) return 0;
            if (questionIndex < 18) return 1;
            if (questionIndex < 27) return 2;
            if (questionIndex < 36) return 3;
            return 4;
        }

        function renderQuestion(skipAnimation) {
            const q = QUESTIONS[currentQuestion];
            const moduleIdx = getModule(currentQuestion);

            document.getElementById('questionCounter').textContent = `第 ${currentQuestion + 1} 题`;
            document.getElementById('moduleTitle').textContent = MODULES[moduleIdx];
            document.getElementById('questionText').textContent = q.q;

            const progress = ((currentQuestion + 1) / 45) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            const optionList = document.getElementById('optionList');
            optionList.innerHTML = '';

            const optionLetters = ['A', 'B', 'C', 'D'];

            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (answers[currentQuestion] === idx ? ' selected' : '');
                btn.textContent = `${optionLetters[idx]}. ${opt}`;
                btn.onclick = () => selectOption(idx);
                optionList.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === 44 ? '查看结果' : '下一题';

            if (!skipAnimation) {
                const card = document.getElementById('questionCard');
                card.style.animation = 'none';
                card.offsetHeight;
                card.style.animation = 'slideIn 0.4s ease';
            }
        }

        function selectOption(idx) {
            answers[currentQuestion] = idx;
            if (currentQuestion < 44) {
                currentQuestion++;
                renderQuestion(true);
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (answers[currentQuestion] === -1) {
                return;
            }

            if (currentQuestion < 44) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function calculateScores() {
            BREEDS.forEach(b => dogScores[b] = 0);

            for (let q = 0; q < 45; q++) {
                const answer = answers[q];
                if (answer === -1) continue;

                const rule = SCORING_RULES[q];
                const optionKey = ['a', 'b', 'c', 'd'][answer];

                const positiveBreeds = rule[optionKey];
                if (positiveBreeds) {
                    Object.keys(positiveBreeds).forEach(breed => {
                        if (dogScores.hasOwnProperty(breed)) {
                            dogScores[breed] += positiveBreeds[breed];
                        }
                    });
                }

                if (rule.n) {
                    Object.keys(rule.n).forEach(breed => {
                        if (dogScores.hasOwnProperty(breed)) {
                            dogScores[breed] += rule.n[breed];
                        }
                    });
                }
            }

            Object.keys(dogScores).forEach(breed => {
                if (dogScores[breed] <= 0) {
                    dogScores[breed] = 0;
                }
            });
        }

        function showResult() {
            calculateScores();

            document.getElementById('testPage').classList.remove('active');
            document.getElementById('resultPage').classList.add('active');
            document.getElementById('progressBar').style.width = '100%';

            let totalScore = 0;
            Object.values(dogScores).forEach(score => {
                if (score > 0) totalScore += score;
            });

            if (totalScore === 0) {
                Object.keys(dogScores).forEach(b => dogScores[b] = 1);
                totalScore = Object.keys(dogScores).length;
            }

            let percentages = [];
            Object.keys(dogScores).forEach(breed => {
                if (dogScores[breed] > 0) {
                    const pct = (dogScores[breed] / totalScore) * 100;
                    percentages.push({ breed, score: dogScores[breed], percent: Math.round(pct * 10) / 10 });
                }
            });

            percentages.sort((a, b) => b.percent - a.percent);

            const zeroBreeds = Object.keys(dogScores).filter(b => dogScores[b] <= 0 && BREED_ZERO_COMMENTS.hasOwnProperty(b));

            const mainBreed = percentages[0];
            const mainBreedInfo = BREED_INFO[mainBreed.breed];

            let resultHTML = `
                <div class="result-main">
                    <div class="result-label">主导品种</div>
                    <div class="result-breed-img">
                        <img src="狗狗(1).png" class="result-dog-frame active" id="result-frame1">
                        <img src="狗狗(2).png" class="result-dog-frame" id="result-frame2">
                        <img src="狗狗(3).png" class="result-dog-frame" id="result-frame3">
                        <img src="狗狗(4).png" class="result-dog-frame" id="result-frame4">
                    </div>
                    <div class="result-title">你的灵魂里，住着一只【${mainBreed.breed}】</div>
                    <div class="result-percentage">${mainBreed.percent}%</div>
                    <div class="result-keywords">
                        ${mainBreedInfo.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('')}
                    </div>
                </div>

                <div class="dna-section">
                    <div class="dna-title">你的"狗塑"DNA成分表</div>
            `;

            const top5 = percentages.slice(0, 5);
            const maxPercent = top5[0].percent;

            top5.forEach((item, idx) => {
                const barWidth = (item.percent / maxPercent) * 100;
                const isMain = idx === 0;
                resultHTML += `
                    <div class="dna-item">
                        <div class="dna-info">
                            <span class="dna-name">${item.breed}${isMain ? '<span class="dna-tag">（主导）</span>' : ''}</span>
                            <span class="dna-percent">${item.percent}%</span>
                        </div>
                        <div class="dna-bar-bg">
                            <div class="dna-bar" style="width: ${barWidth}%"></div>
                        </div>
                    </div>
                `;
            });

            resultHTML += `</div>`;

            if (zeroBreeds.length > 0) {
                const zeroBreed = zeroBreeds[0];

                resultHTML += `
                    <div class="zero-section">
                        <div class="zero-stamp">绝缘体鉴定</div>
                        <div class="zero-title">${zeroBreed}</div>
                        <div class="zero-desc">${BREED_ZERO_COMMENTS[zeroBreed] || '你与这种性格特征完全绝缘'}</div>
                    </div>
                `;
            }

            resultHTML += `
                <button class="retest-btn" onclick="location.reload()">重新测试</button>
                <div class="footer">测一测你的狗塑是什么品种</div>
                <div class="stats-container">
                    <div class="stat-item">
                        <span class="stat-icon">👁</span>
                        <span>访问量</span>
                        <span class="stat-count" id="busuanzi_container_site_pv">
                            <span id="busuanzi_value_site_pv">-</span>
                        </span>
                        <span>次</span>
                    </div>
                </div>
            `;

            document.getElementById('resultPage').innerHTML = resultHTML;

            let resultFrame = 0;
            setInterval(() => {
                document.getElementById('result-frame' + (resultFrame + 1)).classList.remove('active');
                resultFrame = (resultFrame + 1) % 4;
                document.getElementById('result-frame' + (resultFrame + 1)).classList.add('active');
            }, 300);
        }
    </script>
