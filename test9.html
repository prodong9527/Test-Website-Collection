        let currentDisplayIndex = 0;
        let answers = new Array(40).fill(-1);

        function startTest() {
            document.getElementById('introPage').classList.remove('active');
            document.getElementById('testPage').classList.add('active');
            renderQuestion();
            createFloatingPetals();
        }

        function createFloatingPetals() {
            const container = document.getElementById('floatingPetals');
            const petals = ['🌸', '✿', '❀', '💮', '🏵'];
            for (let i = 0; i < 12; i++) {
                const petal = document.createElement('span');
                petal.className = 'petal';
                petal.textContent = petals[Math.floor(Math.random() * petals.length)];
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDelay = Math.random() * 20 + 's';
                petal.style.fontSize = (14 + Math.random() * 12) + 'px';
                container.appendChild(petal);
            }
        }

        function getDimension(displayIndex) {
            const originalQ = SHUFFLED_ORDER[displayIndex];
            if (originalQ <= 10) return DIM_LABELS[0];
            if (originalQ <= 20) return DIM_LABELS[1];
            if (originalQ <= 30) return DIM_LABELS[2];
            return DIM_LABELS[3];
        }

        function renderQuestion(skipAnimation) {
            const originalQIndex = SHUFFLED_ORDER[currentDisplayIndex] - 1;
            const q = ORIGINAL_QUESTIONS[originalQIndex];
            const dimension = getDimension(currentDisplayIndex);

            document.getElementById('questionCounter').textContent = `第 ${currentDisplayIndex + 1} 题`;
            document.getElementById('dimensionTag').textContent = dimension;
            document.getElementById('questionText').textContent = q.q;

            const progress = ((currentDisplayIndex + 1) / 40) * 100;
            document.getElementById('progressBar').style.width = progress + '%';

            const optionList = document.getElementById('optionList');
            optionList.innerHTML = '';

            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (answers[currentDisplayIndex] === idx ? ' selected' : '');
                btn.textContent = opt;
                btn.onclick = () => selectOption(idx);
                optionList.appendChild(btn);
            });

            document.getElementById('prevBtn').disabled = currentDisplayIndex === 0;
            document.getElementById('nextBtn').textContent = currentDisplayIndex === 39 ? '查看结果' : '下一题';

            if (!skipAnimation) {
                const card = document.getElementById('questionCard');
                card.style.animation = 'none';
                card.offsetHeight;
                card.style.animation = 'slideIn 0.4s ease';
            }
        }

        function selectOption(idx) {
            answers[currentDisplayIndex] = idx;
            renderQuestion(true);
            setTimeout(() => {
                if (currentDisplayIndex < 39) {
                    currentDisplayIndex++;
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 200);
        }

        function prevQuestion() {
            if (currentDisplayIndex > 0) {
                currentDisplayIndex--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (answers[currentDisplayIndex] === -1) return;
            if (currentDisplayIndex < 39) {
                currentDisplayIndex++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function calculateScores() {
            let rawScores = {1_10: 0, 11_20: 0, 21_30: 0, 31_40: 0};

            for (let i = 0; i < 40; i++) {
                const originalQ = SHUFFLED_ORDER[i];
                const score = 4 - answers[i];

                if (originalQ <= 10) rawScores[1_10] += score;
                else if (originalQ <= 20) rawScores[11_20] += score;
                else if (originalQ <= 30) rawScores[21_30] += score;
                else rawScores[31_40] += score;
            }

            let radar = {
                掌控欲: Math.round((rawScores[1_10] / 40) * 100),
                侵略性: Math.round(((rawScores[1_10] + rawScores[11_20]) / 80) * 100),
                独立: Math.round((rawScores[21_30] / 40) * 100),
                粘人: Math.round(((50 - rawScores[21_30]) / 40) * 100),
                腹黑: Math.round((rawScores[31_40] / 40) * 100),
                傲娇: Math.round(((rawScores[11_20] + rawScores[31_40]) / 80) * 100),
                钓系: Math.round((((50 - rawScores[11_20]) + rawScores[31_40]) / 80) * 100)
            };

            return {
                raw: rawScores,
                radar: radar,
                攻受: rawScores[1_10],
                气场: rawScores[11_20],
                独立: rawScores[21_30],
                表达: rawScores[31_40]
            };
        }

        function getResultType(scores) {
            const t1 = scores.攻受 >= 25 ? 'T' : 'B';
            const t2 = scores.气场 >= 25 ? 'S' : 'W';
            const t3 = scores.独立 >= 25 ? 'I' : 'C';
            const t4 = scores.表达 >= 25 ? 'D' : 'F';
            return t1 + t2 + t3 + t4;
        }

        function drawRadar(radar) {
            const labels = ['掌控欲', '侵略性', '独立', '粘人', '腹黑', '傲娇', '钓系'];
            const values = [radar.掌控欲, radar.侵略性, radar.独立, radar.粘人, radar.腹黑, radar.傲娇, radar.钓系];
            const centerX = 140, centerY = 140, radius = 100;
            const angleStep = (Math.PI * 2) / 7;
            const startAngle = -Math.PI / 2;

            let points = [];
            for (let i = 0; i < 7; i++) {
                const angle = startAngle + i * angleStep;
                const value = values[i] / 100;
                const x = centerX + Math.cos(angle) * radius * value;
                const y = centerY + Math.sin(angle) * radius * value;
                points.push({x, y, label: labels[i], value: values[i]});
            }

            let html = '<div class="radar-section"><div class="radar-title">七维人格雷达图</div><div class="radar-chart">';
            html += '<svg width="280" height="280" viewBox="0 0 280 280">';

            for (let r = 1; r <= 4; r++) {
                const polygonPoints = [];
                for (let i = 0; i < 7; i++) {
                    const angle = startAngle + i * angleStep;
                    const x = centerX + Math.cos(angle) * radius * (r / 4);
                    const y = centerY + Math.sin(angle) * radius * (r / 4);
                    polygonPoints.push(`${x},${y}`);
                }
                html += `<polygon points="${polygonPoints.join(' ')}" fill="none" stroke="#f0e0e0" stroke-width="1"/>`;
            }

            for (let i = 0; i < 7; i++) {
                const angle = startAngle + i * angleStep;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                html += `<line x1="${centerX}" y1="${centerY}" x2="${x}" y2="${y}" stroke="#f0e0e0" stroke-width="1"/>`;
            }

            const dataPoints = points.map(p => `${p.x},${p.y}`).join(' ');
            html += `<polygon points="${dataPoints}" fill="rgba(255,154,158,0.3)" stroke="#ff9a9e" stroke-width="2"/>`;

            for (let i = 0; i < 7; i++) {
                html += `<circle cx="${points[i].x}" cy="${points[i].y}" r="4" fill="#ff9a9e"/>`;
            }

            html += '</svg>';

            html += '<div class="radar-labels">';
            for (let i = 0; i < 7; i++) {
                const angle = startAngle + i * angleStep;
                const labelX = centerX + Math.cos(angle) * (radius + 35);
                const labelY = centerY + Math.sin(angle) * (radius + 35);
                html += `<div class="radar-label" style="left:${labelX}px;top:${labelY}px;">${points[i].label}<span>${points[i].value}</span></div>`;
            }
            html += '</div></div></div>';

            return html;
        }

        function showResult() {
            const scores = calculateScores();
            const resultType = getResultType(scores);
            const result = RESULTS[resultType];

            document.getElementById('testPage').classList.remove('active');
            document.getElementById('resultPage').classList.add('active');
            document.getElementById('progressBar').style.width = '100%';

            let html = `
                <a href="index.html" class="back-link">← 返回目录</a>
                <div class="result-main">
                    <div class="result-label">你的体质类型</div>
                    <div class="result-type">${resultType}</div>
                    <div class="result-title">${result.name}</div>
                </div>

                <div class="dimension-result">
                    <div class="dim-item">
                        <div class="dim-label">攻受值</div>
                        <div class="dim-value">${scores.攻受}</div>
                    </div>
                    <div class="dim-item">
                        <div class="dim-label">气场值</div>
                        <div class="dim-value">${scores.气场}</div>
                    </div>
                    <div class="dim-item">
                        <div class="dim-label">独立值</div>
                        <div class="dim-value">${scores.独立}</div>
                    </div>
                    <div class="dim-item">
                        <div class="dim-label">表达值</div>
                        <div class="dim-value">${scores.表达}</div>
                    </div>
                </div>

                ${drawRadar(scores.radar)}

                <div class="result-main" style="margin-top:20px;">
                    <div class="result-desc">${result.desc}</div>
                </div>

                <button class="retest-btn" onclick="location.reload()">重新测试</button>
            `;

            document.getElementById('resultPage').innerHTML = html;
        }
    </script>
