            { min: 60, max: 74, title: '陷入热恋', subtitle: '满心满眼，唯你而已', desc: '无论你们是否已经确立关系，你的心理状态已经是绝对的热恋级别。你的时间、精力和情绪都在无条件地向TA倾斜。TA的缺点在你眼里变成了可爱的佐证，你在TA身上投入了巨大的情感沉没成本且甘之如饴，这是多巴胺分泌最旺盛、最上头的阶段。' },
            { min: 75, max: 89, title: '灵魂共振', subtitle: '深情款款，岁月长河', desc: '你的喜欢已经褪去了最初的盲目冲动，沉淀为一种深邃的联结。你不仅迷恋TA的闪光点，更接纳TA的破碎与真实。你已经把TA写入了自己未来的长期规划里，这不再是一时的情绪上头，而是深思熟虑后，依然决定坚定走向TA的双向奔赴感。' },
            { min: 90, max: 100, title: '非TA不可', subtitle: '宿命牵引，毫无保留', desc: '这是最高阶的极致情感。在你的认知里，TA不仅是伴侣，更是你灵魂的另一半拼图。你的爱包含了极致的包容、奉献与不可替代性。哪怕这段关系面临巨大的现实阻碍，你也有与之对抗的绝对勇气。全世界的人加起来，也抵不过TA看向你时的那个眼神。' }
        ];

        var answers = [];
        var currentPage = 0;
        var questionsPerPage = 10;
        var isDragging = false;
        var currentDragTarget = null;

        function init() {
            answers = new Array(50).fill(-1);
            currentPage = 0;
            document.getElementById('start-btn').addEventListener('click', startTest);
            document.getElementById('prev-btn').addEventListener('click', prevPage);
            document.getElementById('next-btn').addEventListener('click', nextPage);
            document.getElementById('restart-btn').addEventListener('click', restartTest);
        }

        function startTest() {
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('test-page').classList.remove('hidden');
            renderQuestions();
            renderProgress();
            updateNavButtons();
        }

        function renderQuestions() {
            var container = document.getElementById('questions-container');
            container.innerHTML = '';

            var startIndex = currentPage * questionsPerPage;
            for (var i = 0; i < questionsPerPage; i++) {
                var qIndex = startIndex + i;
                var card = document.createElement('div');
                card.className = 'question-card';
                card.innerHTML =
                    '<span class="question-num">' + (qIndex + 1) + '</span>' +
                    '<div class="question-text">' + questions[qIndex] + '</div>' +
                    '<div class="slider-container" data-question="' + qIndex + '">' +
                        '<div class="slider-labels">' +
                            '<span>完全没有</span>' +
                            '<span>非常强烈</span>' +
                        '</div>' +
                        '<div class="slider-track">' +
                            '<div class="slider-ticks">' +
                                '<div class="slider-tick" style="left: 0%"></div>' +
                                '<div class="slider-tick" style="left: 25%"></div>' +
                                '<div class="slider-tick" style="left: 50%"></div>' +
                                '<div class="slider-tick" style="left: 75%"></div>' +
                                '<div class="slider-tick" style="left: 100%"></div>' +
                            '</div>' +
                            '<div class="slider-fill" style="width: ' + getPercent(answers[qIndex]) + '"></div>' +
                            '<div class="slider-thumb" style="left: ' + getPercent(answers[qIndex]) + '" data-question="' + qIndex + '"></div>' +
                        '</div>' +
                    '</div>';
                container.appendChild(card);
            }

            initSliders();
            updateTickStates();
        }

        function getPercent(score) {
            if (score === -1) return '0%';
            return (score / 4 * 100) + '%';
        }

        function updateTickStates() {
            var ticks = document.querySelectorAll('.slider-tick');
            var currentScore = answers[parseInt(ticks[0].closest('.slider-container').dataset.question)];
            if (currentScore === -1) currentScore = 0;
            ticks.forEach(function(tick, idx) {
                if (idx <= currentScore) {
                    tick.classList.add('active');
                } else {
                    tick.classList.remove('active');
                }
            });
        }

        function initSliders() {
            var thumbs = document.querySelectorAll('.slider-thumb');
            var tracks = document.querySelectorAll('.slider-track');

            thumbs.forEach(function(thumb) {
                thumb.addEventListener('mousedown', startDrag);
                thumb.addEventListener('touchstart', startDrag, { passive: false });
            });

            tracks.forEach(function(track) {
                track.addEventListener('click', function(e) {
                    if (e.target.classList.contains('slider-thumb')) return;
                    var rect = track.getBoundingClientRect();
                    var x = e.clientX - rect.left;
                    var percent = (x / rect.width) * 100;
                    percent = Math.max(0, Math.min(100, percent));
                    var qIndex = parseInt(track.parentElement.dataset.question);
                    snapToPosition(qIndex, percent);
                });
            });
        }

        function startDrag(e) {
            e.preventDefault();
            isDragging = true;
            currentDragTarget = e.target;
            currentDragTarget.classList.add('dragging');
            currentDragTarget.classList.remove('snapping');

            var moveHandler = function(e) {
                if (!isDragging) return;
                var track = currentDragTarget.parentElement;
                var rect = track.getBoundingClientRect();
                var clientX = e.clientX || e.touches[0].clientX;
                var x = clientX - rect.left;
                var percent = (x / rect.width) * 100;
                percent = Math.max(0, Math.min(100, percent));

                var fill = track.querySelector('.slider-fill');
                currentDragTarget.style.left = percent + '%';
                fill.style.width = percent + '%';

                updateTickStatesDrag(track.parentElement.dataset.question, percent);
            };

            var endHandler = function(e) {
                if (!isDragging) return;
                isDragging = false;
                currentDragTarget.classList.remove('dragging');

                var track = currentDragTarget.parentElement;
                var rect = track.getBoundingClientRect();
                var clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX) || 0;
                var x = clientX - rect.left;
                var percent = (x / rect.width) * 100;
                percent = Math.max(0, Math.min(100, percent));

                var qIndex = parseInt(currentDragTarget.dataset.question);
                snapToPosition(qIndex, percent);

                document.removeEventListener('mousemove', moveHandler);
                document.removeEventListener('mouseup', endHandler);
                document.removeEventListener('touchmove', moveHandler);
                document.removeEventListener('touchend', endHandler);
                currentDragTarget = null;
            };

            document.addEventListener('mousemove', moveHandler);
            document.addEventListener('mouseup', endHandler);
            document.addEventListener('touchmove', moveHandler, { passive: false });
            document.addEventListener('touchend', endHandler);
        }

        function updateTickStatesDrag(qIndex, percent) {
            var container = document.querySelector('.slider-container[data-question="' + qIndex + '"]');
            var score = Math.round(percent / 25);
            var ticks = container.querySelectorAll('.slider-tick');
            ticks.forEach(function(tick, idx) {
                if (idx <= score) {
                    tick.classList.add('active');
                } else {
                    tick.classList.remove('active');
                }
            });
        }

        function snapToPosition(qIndex, percent) {
            var score = Math.round(percent * 4 / 100);
            score = Math.max(0, Math.min(4, score));

            answers[qIndex] = score;

            var thumb = document.querySelector('.slider-thumb[data-question="' + qIndex + '"]');
            var fill = thumb.parentElement.querySelector('.slider-fill');

            thumb.classList.add('snapping');
            var snappedPercent = (score / 4 * 100) + '%';
            thumb.style.left = snappedPercent;
            fill.style.width = snappedPercent;

            setTimeout(function() {
                thumb.classList.remove('snapping');
            }, 250);

            updateTickStates();
            checkPageComplete();
        }

        function renderProgress() {
            var progress = document.getElementById('progress');
            var html = '';
            for (var i = 0; i < 5; i++) {
                var cls = 'progress-dot';
                if (i === currentPage) cls += ' active';
                else if (i < currentPage) cls += ' done';
                html += '<div class="' + cls + '"></div>';
            }
            progress.innerHTML = html;
            document.getElementById('page-indicator').textContent = (currentPage + 1) + ' / 5';
        }

        function checkPageComplete() {
            var startIndex = currentPage * questionsPerPage;
            var isComplete = true;
            for (var i = 0; i < questionsPerPage; i++) {
                if (answers[startIndex + i] === -1) {
                    isComplete = false;
                    break;
                }
            }

            var nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = !isComplete;
            if (currentPage === 4) {
                nextBtn.textContent = '查看结果';
                nextBtn.classList.add('submit');
            } else {
                nextBtn.textContent = '下一页';
                nextBtn.classList.remove('submit');
            }
        }

        function updateNavButtons() {
            var prevBtn = document.getElementById('prev-btn');
            prevBtn.style.visibility = currentPage === 0 ? 'hidden' : 'visible';
            checkPageComplete();
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderQuestions();
                renderProgress();
                updateNavButtons();
            }
        }

        function nextPage() {
            if (currentPage < 4) {
                currentPage++;
                renderQuestions();
                renderProgress();
                updateNavButtons();
            } else {
                showResult();
            }
        }

        function showResult() {
            var totalScore = 0;
            for (var i = 0; i < answers.length; i++) {
                totalScore += answers[i];
            }
            var finalScore = Math.round(totalScore / 2);

            var result = results[0];
            for (var j = 0; j < results.length; j++) {
                if (finalScore >= results[j].min && finalScore <= results[j].max) {
                    result = results[j];
                    break;
                }
            }

            document.getElementById('test-page').classList.add('hidden');
            var resultPage = document.getElementById('result-page');
            resultPage.classList.remove('hidden');
            document.getElementById('score-display').textContent = finalScore;
            document.getElementById('result-title').textContent = result.title;
            document.getElementById('result-subtitle').textContent = result.subtitle;
            document.getElementById('result-desc').textContent = result.desc;
        }

        function restartTest() {
            answers = new Array(50).fill(-1);
            currentPage = 0;
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('test-page').classList.remove('hidden');
            renderQuestions();
            renderProgress();
            updateNavButtons();
        }

        init();
    </script>
</body>
</html>
